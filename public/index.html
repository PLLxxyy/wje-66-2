<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>花语轩 - 让每一束花都有故事</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- ==================== HOME PAGE ==================== -->
  <div class="page active" id="page-home">
    <div class="banner">
      <h2>花语轩</h2>
      <p>让每一束花都有故事 · 全城2小时达</p>
    </div>
    <div class="search-bar">
      <input type="text" id="home-search" placeholder="搜索花束..." oninput="searchProducts(this.value)">
    </div>
    <div class="category-tabs" id="category-tabs"></div>
    <div class="product-grid" id="product-grid"></div>
  </div>

  <!-- ==================== DETAIL PAGE ==================== -->
  <div class="page" id="page-detail">
    <div class="page-header">
      <button class="back-btn" onclick="goBack()">← 返回</button>
      <h1>花束详情</h1>
      <div style="width:60px"></div>
    </div>
    <div id="detail-content"></div>
    <div class="detail-actions" id="detail-actions"></div>
  </div>

  <!-- ==================== CART PAGE ==================== -->
  <div class="page" id="page-cart">
    <div class="page-header">
      <div style="width:60px"></div>
      <h1>购物车</h1>
      <div style="width:60px"></div>
    </div>
    <div id="cart-content"></div>
    <div class="cart-bottom" id="cart-bottom"></div>
  </div>

  <!-- ==================== CHECKOUT PAGE ==================== -->
  <div class="page" id="page-checkout">
    <div class="page-header">
      <button class="back-btn" onclick="navigateTo('cart')">← 返回</button>
      <h1>确认订单</h1>
      <div style="width:60px"></div>
    </div>
    <div id="checkout-content"></div>
  </div>

  <!-- ==================== ORDER SUCCESS ==================== -->
  <div class="page" id="page-order-success">
    <div class="page-header">
      <div style="width:60px"></div>
      <h1>下单成功</h1>
      <div style="width:60px"></div>
    </div>
    <div class="order-success" id="order-success-content"></div>
  </div>

  <!-- ==================== USER CENTER ==================== -->
  <div class="page" id="page-user">
    <div class="page-header">
      <div style="width:60px"></div>
      <h1>个人中心</h1>
      <div style="width:60px"></div>
    </div>
    <div class="user-header">
      <div class="user-avatar">🌸</div>
      <div class="user-name">花语轩会员</div>
    </div>
    <div class="user-menu">
      <div class="menu-item" onclick="navigateTo('orders')">
        <div class="icon" style="background:#fff0f6;color:var(--pink-6)">📦</div>
        <div class="text">我的订单</div>
        <div class="arrow">›</div>
      </div>
      <div class="menu-item" onclick="navigateTo('addresses')">
        <div class="icon" style="background:#e6f7ff;color:#1890ff">📍</div>
        <div class="text">收货地址</div>
        <div class="arrow">›</div>
      </div>
      <div class="menu-item" onclick="navigateTo('favorites')">
        <div class="icon" style="background:#fff0f6;color:var(--red)">❤️</div>
        <div class="text">我的收藏</div>
        <div class="arrow">›</div>
      </div>
      <div class="menu-item" onclick="navigateTo('admin')">
        <div class="icon" style="background:#fffbe6;color:var(--gold)">⚙️</div>
        <div class="text">管理后台</div>
        <div class="arrow">›</div>
      </div>
    </div>
  </div>

  <!-- ==================== ADDRESSES PAGE ==================== -->
  <div class="page" id="page-addresses">
    <div class="page-header">
      <button class="back-btn" onclick="navigateTo('user')">← 返回</button>
      <h1>收货地址</h1>
      <div style="width:60px"></div>
    </div>
    <div id="addresses-content"></div>
    <button class="address-add-btn" onclick="showAddressModal()">+ 新增收货地址</button>
  </div>

  <!-- ==================== ADDRESS SELECT PAGE ==================== -->
  <div class="page" id="page-address-select">
    <div class="page-header">
      <button class="back-btn" onclick="navigateTo('checkout')">← 返回</button>
      <h1>选择地址</h1>
      <div style="width:60px"></div>
    </div>
    <div id="address-select-content"></div>
    <button class="address-add-btn" onclick="showAddressModal(null, 'select')">+ 使用新地址</button>
  </div>

  <!-- ==================== ORDERS PAGE ==================== -->
  <div class="page" id="page-orders">
    <div class="page-header">
      <button class="back-btn" onclick="navigateTo('user')">← 返回</button>
      <h1>我的订单</h1>
      <div style="width:60px"></div>
    </div>
    <div id="orders-content"></div>
  </div>

  <!-- ==================== FAVORITES PAGE ==================== -->
  <div class="page" id="page-favorites">
    <div class="page-header">
      <button class="back-btn" onclick="navigateTo('user')">← 返回</button>
      <h1>我的收藏</h1>
      <div style="width:60px"></div>
    </div>
    <div id="favorites-content"></div>
  </div>

  <!-- ==================== ADMIN PAGE ==================== -->
  <div class="page" id="page-admin">
    <div class="page-header">
      <button class="back-btn" onclick="navigateTo('user')">← 返回</button>
      <h1>管理后台</h1>
      <div style="width:60px"></div>
    </div>
    <div class="admin-tabs">
      <div class="admin-tab active" data-tab="products" onclick="switchAdminTab('products')">商品管理</div>
      <div class="admin-tab" data-tab="admin-orders" onclick="switchAdminTab('admin-orders')">订单管理</div>
      <div class="admin-tab" data-tab="stats" onclick="switchAdminTab('stats')">数据统计</div>
    </div>
    <div class="admin-content" id="admin-content"></div>
    <button class="admin-add-btn" id="admin-add-btn" onclick="showProductModal()">+</button>
  </div>

  <!-- ==================== MODAL ==================== -->
  <div class="modal-overlay" id="modal-overlay" style="display:none" onclick="closeModalOutside(event)">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- ==================== TAB BAR ==================== -->
  <div class="tab-bar" id="tab-bar">
    <div class="tab-item active" data-page="home" onclick="navigateTo('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </div>
    <div class="tab-item" data-page="cart" onclick="navigateTo('cart')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
      <span>购物车</span>
    </div>
    <div class="tab-item" data-page="user" onclick="navigateTo('user')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
